<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Requisitos Legais - Cemig</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="config.js"></script>
<style>
    body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:0;}
    header{background:#2c3e50;color:#fff;padding:15px;text-align:center;position:relative;}
    .sync-status{position:absolute;top:15px;right:15px;background:#27ae60;color:#fff;padding:5px 10px;border-radius:4px;font-size:0.85rem;}
    .sync-status.syncing{background:#f39c12;}
    .sync-status.error{background:#c0392b;}
    .container{max-width:1200px;margin:20px auto;padding:20px;background:#fff;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1);}
    .dashboard{display:flex;justify-content:space-around;margin-bottom:30px;flex-wrap:wrap;}
    .card{flex:1;max-width:300px;background:#e8f0fe;padding:20px;margin:10px;border-radius:6px;text-align:center;}
    .card h3{margin:0 0 10px;font-size:1.2rem;color:#333;}
    .card p{font-size:2rem;margin:0;color:#0066cc;}
    .controls{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;}
    button{background:#0066cc;color:#fff;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;}
    button:hover{background:#0055a5;}
    button:disabled{background:#ccc;cursor:not-allowed;}
    .btn-sync{background:#27ae60;}
    .btn-sync:hover{background:#1e8449;}
    .btn-export{background:#8e44ad;}
    .btn-export:hover{background:#6c3483;}
    table{width:100%;border-collapse:collapse;margin-top:20px;font-size:0.9rem;}
    th,td{padding:10px;border:1px solid #ddd;text-align:left;}
    th{background:#f0f0f0;}
    .filter-select{width:100%;margin-top:5px;padding:5px;}
    .actions button{margin-right:5px;background:#27ae60;font-size:0.85rem;padding:5px 10px;}
    .actions button.delete{background:#c0392b;}
    .actions button.edit{background:#2980b9;}
    .row-expired{background:#ffebee !important;}
    .row-near{background:#fff9c4 !important;}
    .row-valid{background:#e8f5e9 !important;}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:1000;}
    .modal-content{background:#fff;padding:20px;border-radius:6px;width:90%;max-width:500px;position:relative;max-height:90vh;overflow-y:auto;}
    .modal-content h2{margin-top:0;}
    .close{position:absolute;top:10px;right:15px;font-size:1.5rem;cursor:pointer;}
    .form-group{margin-bottom:15px;}
    .form-group label{display:block;margin-bottom:5px;font-weight:bold;}
    .form-group input, .form-group select{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;}
    .error{color:#c0392b;font-size:.9rem;margin-top:10px;}
    .search-wrapper{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;gap:10px;flex-wrap:wrap;}
    .search-wrapper input{flex:1;min-width:200px;padding:8px;border:1px solid #ccc;border-radius:4px;}
    .last-update{text-align:center;color:#666;font-size:0.85rem;margin-top:10px;}
    
    @media (max-width: 768px) {
        .card{max-width:100%;}
        table{font-size:0.75rem;}
        th,td{padding:5px;}
    }
</style>
</head>
<body>
<header>
    <h1>📋 Plataforma de Controle de Requisitos Legais</h1>
    <div class="sync-status" id="syncStatus">● Sincronizado</div>
</header>

<div class="container">
    <!-- Indicadores -->
    <section class="dashboard">
        <div class="card"><h3>✅ Válidos</h3><p id="validCount">0</p></div>
        <div class="card"><h3>⚠️ Vencendo &lt; 90 dias</h3><p id="nearCount">0</p></div>
        <div class="card"><h3>❌ Vencidos</h3><p id="expiredCount">0</p></div>
    </section>

    <!-- Controles -->
    <div class="controls">
        <button id="btnAdd">➕ Novo Documento</button>
        <button id="btnSync" class="btn-sync">🔄 Sincronizar Agora</button>
        <button id="btnExport" class="btn-export">📥 Exportar Excel</button>
        <button id="btnConfig">⚙️ Configurar Token</button>
    </div>

    <!-- Pesquisa e Filtros -->
    <div class="search-wrapper">
        <input type="text" id="globalSearch" placeholder="🔍 Pesquisar documentos...">
        <select id="filterType" class="filter-select">
            <option value="">Todos os tipos</option>
            <option>AVCB</option>
            <option>Alvará</option>
            <option>Licença Ambiental</option>
            <option>Treinamento NR 10</option>
            <option>Treinamento NR 10 e 35</option>
            <option>Treinamento NR 33</option>
            <option>LPU de Motocultura</option>
            <option>Outorga de Poço Artesiano</option>
            <option>Outros</option>
        </select>
        <select id="filterStatus" class="filter-select">
            <option value="">Todas as situações</option>
            <option value="valid">Válido</option>
            <option value="near">Vencendo &lt; 90 dias</option>
            <option value="expired">Vencido</option>
        </select>
    </div>

    <!-- Tabela -->
    <table id="docTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Nome / Identificação</th>
                <th>Tipo</th>
                <th>Data Emissão</th>
                <th>Data Validade</th>
                <th>Status</th>
                <th>Link</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="last-update" id="lastUpdate"></div>

    <!-- Gráfico -->
    <h2 style="margin-top:40px;">📊 Previsão de Vencimentos (próximos 5 anos)</h2>
    <canvas id="semesterChart"></canvas>
</div>

<!-- Modal -->
<div class="modal" id="docModal">
    <div class="modal-content">
        <span class="close" id="closeModal">×</span>
        <h2 id="modalTitle">Novo Documento</h2>
        <form id="docForm">
            <div class="form-group">
                <label for="docName">Nome / Identificação *</label>
                <input type="text" id="docName" required>
            </div>
            <div class="form-group">
                <label for="docType">Tipo de Documento *</label>
                <select id="docType" required>
                    <option value="">Selecione...</option>
                    <option>AVCB</option>
                    <option>Alvará</option>
                    <option>Licença Ambiental</option>
                    <option>Treinamento NR 10</option>
                    <option>Treinamento NR 10 e 35</option>
                    <option>Treinamento NR 33</option>
                    <option>LPU de Motocultura</option>
                    <option>Outorga de Poço Artesiano</option>
                    <option>Outros</option>
                </select>
            </div>
            <div class="form-group">
                <label for="docIssue">Data de Emissão *</label>
                <input type="date" id="docIssue" required>
            </div>
            <div class="form-group">
                <label for="docExpiry">Data de Validade *</label>
                <input type="date" id="docExpiry" required>
            </div>
            <div class="form-group">
                <label for="docLink">Link do Documento *</label>
                <input type="url" id="docLink" placeholder="https://..." required>
            </div>
            <input type="hidden" id="docId">
            <div class="error" id="formError"></div>
            <button type="submit">💾 Salvar</button>
        </form>
    </div>
</div>

<script>
/* =========================================================
   GITHUB SYNC ENGINE
   ========================================================= */
class GitHubSync {
    constructor() {
        this.dataPath = 'data.json';
        this.sha = null;
        this.lastSync = null;
        this.autoRefreshTimer = null;
    }

    get apiUrl() {
        return `https://api.github.com/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/contents/${this.dataPath}`;
    }

    get headers() {
        const token = getGitHubToken();
        return {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
        };
    }

    updateStatus(message, type = 'success') {
        const statusEl = document.getElementById('syncStatus');
        statusEl.textContent = `● ${message}`;
        statusEl.className = 'sync-status ' + type;
    }

    async fetch() {
        try {
            this.updateStatus('Sincronizando...', 'syncing');
            
            const response = await fetch(this.apiUrl, { headers: this.headers });
            
            if (!response.ok) {
                if (response.status === 404) {
                    // Arquivo não existe, criar um novo
                    await this.push({ docs: [], lastUpdate: new Date().toISOString(), version: 1 });
                    return { docs: [], lastUpdate: new Date().toISOString(), version: 1 };
                }
                throw new Error(`GitHub API error: ${response.status}`);
            }

            const data = await response.json();
            this.sha = data.sha;
            
            const content = JSON.parse(atob(data.content));
            this.lastSync = new Date();
            this.updateStatus('Sincronizado', 'success');
            
            return content;
        } catch (error) {
            console.error('Erro ao buscar dados:', error);
            this.updateStatus('Erro na sincronização', 'error');
            alert('❌ Erro ao sincronizar com GitHub. Verifique o token e configurações.');
            return null;
        }
    }

    async push(data) {
        try {
            this.updateStatus('Salvando...', 'syncing');
            
            data.lastUpdate = new Date().toISOString();
            data.version = (data.version || 0) + 1;
            
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
            
            const body = {
                message: `Atualização automática - ${new Date().toLocaleString('pt-BR')}`,
                content: content,
                branch: CONFIG.GITHUB_BRANCH
            };
            
            if (this.sha) {
                body.sha = this.sha;
            }

            const response = await fetch(this.apiUrl, {
                method: 'PUT',
                headers: this.headers,
                body: JSON.stringify(body)
            });

            if (!response.ok) {
                throw new Error(`GitHub API error: ${response.status}`);
            }

            const result = await response.json();
            this.sha = result.content.sha;
            this.lastSync = new Date();
            
            this.updateStatus('Salvo com sucesso', 'success');
            setTimeout(() => this.updateStatus('Sincronizado', 'success'), 2000);
            
            return true;
        } catch (error) {
            console.error('Erro ao salvar dados:', error);
            this.updateStatus('Erro ao salvar', 'error');
            alert('❌ Erro ao salvar no GitHub. Tente novamente.');
            return false;
        }
    }

    startAutoRefresh() {
        if (this.autoRefreshTimer) {
            clearInterval(this.autoRefreshTimer);
        }
        
        this.autoRefreshTimer = setInterval(async () => {
            const data = await this.fetch();
            if (data) {
                docs = data.docs || [];
                refreshAll();
            }
        }, CONFIG.AUTO_REFRESH_INTERVAL * 1000);
    }

    stopAutoRefresh() {
        if (this.autoRefreshTimer) {
            clearInterval(this.autoRefreshTimer);
            this.autoRefreshTimer = null;
        }
    }
}

const github = new GitHubSync();
let docs = [];

/* =========================================================
   UTILITY FUNCTIONS
   ========================================================= */
function daysDiff(a, b) { return Math.floor((b - a) / (1000 * 60 * 60 * 24)); }

function formatDate(str) {
    const d = new Date(str + 'T00:00:00');
    return d.toLocaleDateString('pt-BR');
}

function getStatus(doc) {
    const today = new Date();
    const exp = new Date(doc.expiry + 'T00:00:00');
    const diff = daysDiff(today, exp);
    if (exp < today) return "expired";
    if (diff <= 90) return "near";
    return "valid";
}

function getStatusText(status) {
    const map = {
        valid: '✅ Válido',
        near: '⚠️ Vencendo',
        expired: '❌ Vencido'
    };
    return map[status] || '';
}

/* =========================================================
   DASHBOARD
   ========================================================= */
function refreshDashboard() {
    const valid = docs.filter(d => getStatus(d) === "valid").length;
    const near = docs.filter(d => getStatus(d) === "near").length;
    const expired = docs.filter(d => getStatus(d) === "expired").length;
    
    document.getElementById('validCount').textContent = valid;
    document.getElementById('nearCount').textContent = near;
    document.getElementById('expiredCount').textContent = expired;
    
    // Atualizar último update
    if (github.lastSync) {
        document.getElementById('lastUpdate').textContent = 
            `Última sincronização: ${github.lastSync.toLocaleString('pt-BR')}`;
    }
}

/* =========================================================
   TABLE
   ========================================================= */
function renderTable() {
    const tbody = document.querySelector('#docTable tbody');
    tbody.innerHTML = "";

    const txtSearch = document.getElementById('globalSearch').value.trim().toLowerCase();
    const typeFilter = document.getElementById('filterType').value;
    const statusFilter = document.getElementById('filterStatus').value;

    const filtered = docs.filter(doc => {
        const searchable = `${doc.name} ${doc.type} ${formatDate(doc.issue)} ${formatDate(doc.expiry)} ${doc.link}`.toLowerCase();
        if (txtSearch && !searchable.includes(txtSearch)) return false;
        if (typeFilter && doc.type !== typeFilter) return false;
        if (statusFilter && getStatus(doc) !== statusFilter) return false;
        return true;
    });

    filtered.forEach((doc, idx) => {
        const status = getStatus(doc);
        const tr = document.createElement('tr');
        tr.className = `row-${status}`;
        tr.innerHTML = `
            <td>${idx + 1}</td>
            <td>${doc.name}</td>
            <td>${doc.type}</td>
            <td>${formatDate(doc.issue)}</td>
            <td>${formatDate(doc.expiry)}</td>
            <td>${getStatusText(status)}</td>
            <td><a href="${doc.link}" target="_blank">🔗 Ver</a></td>
            <td class="actions">
                <button class="edit" data-id="${doc.id}">✎ Editar</button>
                <button class="delete" data-id="${doc.id}">🗑 Excluir</button>
            </td>`;
        tbody.appendChild(tr);
    });
}

/* =========================================================
   CHART
   ========================================================= */
let semesterChart = null;
function buildChart() {
    const now = new Date();
    const labels = [];
    const data = new Array(10).fill(0);

    for (let i = 0; i < 10; i++) {
        const start = new Date(now.getFullYear(), now.getMonth(), 1);
        start.setMonth(start.getMonth() + i * 6);
        const month = start.getMonth() + 1;
        const year = start.getFullYear();
        labels.push(`S${i + 1} (${month}/${year})`);
    }

    docs.forEach(d => {
        const exp = new Date(d.expiry + 'T00:00:00');
        if (exp < now) return;
        const diffMonths = (exp.getFullYear() - now.getFullYear()) * 12 + (exp.getMonth() - now.getMonth());
        const idx = Math.floor(diffMonths / 6);
        if (idx >= 0 && idx < 10) data[idx] += 1;
    });

    const ctx = document.getElementById('semesterChart').getContext('2d');
    if (semesterChart) semesterChart.destroy();
    semesterChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [{
                label: 'Documentos que vencem',
                data,
                backgroundColor: '#0066cc',
                borderColor: '#004999',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true, ticks: { precision: 0 } }
            }
        }
    });
}

/* =========================================================
   MODAL
   ========================================================= */
const modal = document.getElementById('docModal');
const form = document.getElementById('docForm');
const modalTitle = document.getElementById('modalTitle');
const errorDiv = document.getElementById('formError');

function openModal(editDoc = null) {
    errorDiv.textContent = "";
    if (editDoc) {
        modalTitle.textContent = "Editar Documento";
        document.getElementById('docId').value = editDoc.id;
        document.getElementById('docName').value = editDoc.name;
        document.getElementById('docType').value = editDoc.type;
        document.getElementById('docIssue').value = editDoc.issue;
        document.getElementById('docExpiry').value = editDoc.expiry;
        document.getElementById('docLink').value = editDoc.link;
    } else {
        modalTitle.textContent = "Novo Documento";
        form.reset();
        document.getElementById('docId').value = "";
    }
    modal.style.display = "flex";
}

function closeModal() { modal.style.display = "none"; }

document.getElementById('closeModal').onclick = closeModal;
window.onclick = e => { if (e.target === modal) closeModal(); };

/* =========================================================
   FORM SUBMIT
   ========================================================= */
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const id = document.getElementById('docId').value;
    const name = document.getElementById('docName').value.trim();
    const type = document.getElementById('docType').value;
    const issue = document.getElementById('docIssue').value;
    const expiry = document.getElementById('docExpiry').value;
    const link = document.getElementById('docLink').value.trim();

    if (new Date(expiry) < new Date(issue)) {
        errorDiv.textContent = "A data de validade não pode ser anterior à data de emissão.";
        return;
    }

    if (id) {
        const idx = docs.findIndex(d => d.id === id);
        if (idx !== -1) docs[idx] = { id, name, type, issue, expiry, link };
    } else {
        docs.push({ id: crypto.randomUUID(), name, type, issue, expiry, link });
    }

    const saved = await github.push({ docs });
    if (saved) {
        closeModal();
        refreshAll();
    }
});

/* =========================================================
   BUTTON EVENTS
   ========================================================= */
document.getElementById('btnAdd').addEventListener('click', () => {
    const pwd = prompt("🔒 Informe a senha para inclusão:");
    if (pwd === CONFIG.EDIT_PASSWORD) openModal();
    else alert("❌ Senha incorreta.");
});

document.getElementById('btnSync').addEventListener('click', async () => {
    const data = await github.fetch();
    if (data) {
        docs = data.docs || [];
        refreshAll();
        alert('✅ Dados sincronizados com sucesso!');
    }
});

document.getElementById('btnExport').addEventListener('click', () => {
    const csv = [
        ['#', 'Nome', 'Tipo', 'Emissão', 'Validade', 'Status', 'Link'],
        ...docs.map((d, i) => [
            i + 1, d.name, d.type,
            formatDate(d.issue), formatDate(d.expiry),
            getStatusText(getStatus(d)), d.link
        ])
    ];

    const csvContent = '\ufeff' + csv.map(row => row.join(';')).join('\n');
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `requisitos_legais_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
});

document.getElementById('btnConfig').addEventListener('click', () => {
    sessionStorage.removeItem('github_token');
    alert('🔑 Token removido. Será solicitado na próxima sincronização.');
});

/* =========================================================
   TABLE ACTIONS
   ========================================================= */
document.querySelector('#docTable tbody').addEventListener('click', async (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    
    const id = btn.dataset.id;
    
    if (btn.classList.contains('edit')) {
        const pwd = prompt("🔒 Informe a senha para edição:");
        if (pwd !== CONFIG.EDIT_PASSWORD) {
            alert("❌ Senha incorreta.");
            return;
        }
        const doc = docs.find(d => d.id === id);
        openModal(doc);
    }
    
    if (btn.classList.contains('delete')) {
        const pwd = prompt("🔒 Informe a senha para exclusão:");
        if (pwd !== CONFIG.EDIT_PASSWORD) {
            alert("❌ Senha incorreta.");
            return;
        }
        if (confirm("⚠️ Deseja realmente excluir este documento?")) {
            docs = docs.filter(d => d.id !== id);
            const saved = await github.push({ docs });
            if (saved) refreshAll();
        }
    }
});

/* =========================================================
   FILTERS
   ========================================================= */
document.getElementById('globalSearch').addEventListener('input', renderTable);
document.getElementById('filterType').addEventListener('change', renderTable);
document.getElementById('filterStatus').addEventListener('change', renderTable);

/* =========================================================
   INIT
   ========================================================= */
function refreshAll() {
    renderTable();
    refreshDashboard();
    buildChart();
}

async function init() {
    const data = await github.fetch();
    if (data) {
        docs = data.docs || [];
        refreshAll();
        github.startAutoRefresh();
        
        // Notificar vencimentos
        const expiringSoon = docs.filter(d => ['near', 'expired'].includes(getStatus(d)));
        if (expiringSoon.length > 0) {
            setTimeout(() => {
                alert(`⚠️ ATENÇÃO: ${expiringSoon.length} documento(s) vencendo ou vencido(s)!`);
            }, 1000);
        }
    }
}

// Limpar timer ao sair
window.addEventListener('beforeunload', () => {
    github.stopAutoRefresh();
});

init();
</script>
</body>
</html>
